name: CI/CD — VidaFarma OS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: mysql://test:test@localhost:3306/test
          JWT_SECRET: test-secret-ci
          SESSION_SECRET: test-session-ci
          VITE_APP_ID: vidafarma
          NODE_ENV: production

  deploy:
    name: Deploy v${{ needs.build.outputs.version }} → Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service vidafarma-os --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.build.outputs.version }}-${{ github.run_number }}
          release_name: v${{ needs.build.outputs.version }} (build ${{ github.run_number }})
          body: |
            ## Deploy automático
            - **Versión:** ${{ needs.build.outputs.version }}
            - **Build:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Mensaje:** ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
