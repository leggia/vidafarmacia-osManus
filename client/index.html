<!doctype html>
<html lang="es-BO">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─── SEO ───────────────────────────────────────────────────────────────
      El título y la descripción son lo que ve un cliente en Google: hablan de la
      FARMACIA (lo que la gente busca), no del sistema interno.
      Ojo: para una farmacia local, la mayor parte del tráfico viene del perfil de
      Google Business (el mapa), no de estas etiquetas. Esto complementa, no
      reemplaza. -->
    <title>VidaFarma — Farmacia en Cochabamba | Medicamentos y reservas online</title>
    <meta
      name="description"
      content="Farmacia VidaFarma en Cochabamba, Bolivia. Consulta precios y disponibilidad de medicamentos en línea y reserva para recoger en la sucursal más cercana. 4 sucursales para atenderte." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph: así se ve el enlace al compartirlo por WhatsApp o Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VidaFarma" />
    <meta property="og:locale" content="es_BO" />
    <meta property="og:title" content="VidaFarma — Farmacia en Cochabamba" />
    <meta
      property="og:description"
      content="Consulta precios y disponibilidad de medicamentos, y reserva para recoger en tu sucursal más cercana." />
    <meta property="og:image" content="/vidafarma-logo.png" />
    <meta name="twitter:card" content="summary" />

    <!-- Datos estructurados: le dicen a Google que esto es una FARMACIA de
      Cochabamba. Es lo que habilita los resultados enriquecidos locales.
      ⚠ PENDIENTE (solo Luis puede completarlo con datos reales): agregar
      "address", "telephone" y "openingHours" de cada sucursal. Sin datos reales
      NO se inventan: un dato falso aquí es peor que no ponerlo. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Pharmacy",
        "name": "VidaFarma",
        "description": "Farmacia con 4 sucursales en Cochabamba, Bolivia. Consulta de precios y reserva de medicamentos en línea.",
        "areaServed": { "@type": "City", "name": "Cochabamba", "addressCountry": "BO" },
        "currenciesAccepted": "BOB"
      }
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#15803d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="VidaFarma" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    <script>
      // Registrar service worker para PWA (instalable en Android)
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>

</html>
